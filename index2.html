<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak Jannat 🌙</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:sans-serif;
  color:white;
  text-align:center;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:40px;
  border-radius:20px;
}

h1{
  font-size:50px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#ffd700;
  font-size:18px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="card">
<h1>🌙 Eid Mubarak Jannat</h1>

<p>
Wishing you a beautiful Eid filled with happiness, peace and blessings.  
May Allah accept all your prayers and give you endless success. ✨
</p>

<button onclick="wish()">Open Eid Wish</button>

</div>

<script>
function wish(){
alert("✨ Eid Mubarak Jannat! May Allah bless you always.");
}
</script>

</body>
</html>
