<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak 🌙✨</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Montserrat', sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
  overflow:hidden;
  color:white;
  text-align:center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 40px 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  max-width: 400px;
  width: 90%;
  position: relative;
}

h1 {
  font-size: 40px;
  margin-bottom: 15px;
  color: #ffd700;
}

p {
  font-size: 18px;
  margin-bottom: 25px;
}

button {
  padding: 12px 25px;
  border:none;
  border-radius:25px;
  background: #ff4d6d;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition: 0.3s;
}

button:hover { transform: scale(1.1); }

.moon {
  position: absolute;
  top: 10%;
  right: 10%;
  width: 80px;
  height: 80px;
  background: radial-gradient(circle at 30% 30%, #fff, #f0e68c);
  border-radius: 50%;
  box-shadow: 0 0 15px #fff;
  animation: floatMoon 6s ease-in-out infinite alternate;
}

@keyframes floatMoon {
  0% { transform: translateY(0); }
  100% { transform: translateY(20px); }
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background:white;
  border-radius:50%;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100% { opacity:0.2; }
  50% { opacity:1; }
}

/* Fireworks */
.firework {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #ffd700;
  border-radius: 50%;
  animation: explode 1s forwards;
}

@keyframes explode {
  0% { transform: scale(1) translate(0,0); opacity:1; }
  100% { transform: scale(0) translate(var(--x), var(--y)); opacity:0; }
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="card">
<h1>🌙 Eid Mubarak!</h1>
<p>Wishing you a blessed Eid filled with joy, peace and beautiful memories.</p>
<button onclick="openWish()">Open Your Eid Wish ✨</button>
</div>

<script>
// Stars
for(let i=0;i<50;i++){
  let star = document.createElement('div');
  star.className='star';
  star.style.top = Math.random()*100+'%';
  star.style.left = Math.random()*100+'%';
  star.style.width = star.style.height = Math.random()*3+'px';
  star.style.animationDuration = (Math.random()*3 + 2)+'s';
  document.body.appendChild(star);
}

// Button click
function openWish(){
  alert("✨ Eid Mubarak! May Allah fill your life with happiness, peace, and blessings. 🌙💛");
  fireworks();
}

// Fireworks function
function fireworks(){
  for(let i=0;i<20;i++){
    let f = document.createElement('div');
    f.className='firework';
    f.style.top = 50 + 'vh';
    f.style.left = 50 + 'vw';
    let angle = Math.random()*360;
    let distance = Math.random()*150 + 50;
    f.style.setProperty('--x', distance*Math.cos(angle*Math.PI/180)+'px');
    f.style.setProperty('--y', distance*Math.sin(angle*Math.PI/180)+'px');
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}
</script>

</body>
</html>
